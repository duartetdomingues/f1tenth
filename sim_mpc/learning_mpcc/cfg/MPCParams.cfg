gen.add("N", double_t,    0, "Prediction Horizon", yaml_params['mpc_params']['objective']['N'])
gen.add("controller_freq", double_t,    0, "Controller Frequency", yaml_params['controller_freq'])
gen.add("NN_flag", double_t,    0, "Neural Network Flag", yaml_params['NN_config']['NN'])
