gen.add("lambda_blend_max", double_t,    0, "Max Blend", yaml_params['model_params']['lambda_blend_max'])
gen.add("C_d", double_t,    0, "Drag Coefficient", yaml_params['model_params']['C_d'])
gen.add("C_l", double_t,    0, "Lift Coefficient", yaml_params['model_params']['C_l'])
gen.add("B", double_t,    0, "Tyre B", yaml_params['tyre_params']['B'])
gen.add("C", double_t,    0, "Tyre C", yaml_params['tyre_params']['C'])
