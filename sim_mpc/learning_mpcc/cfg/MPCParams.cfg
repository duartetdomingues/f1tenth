#!/usr/bin/env python
PACKAGE = "learning_mpcc"

from dynamic_reconfigure.parameter_generator_catkin import *

gen = ParameterGenerator()

# Load the default parameter values from YAML
import yaml
import os
current_path = os.path.dirname(os.path.abspath(__file__))
parent_path = os.path.dirname(current_path) 
with open(parent_path + '/config/default.yaml', 'r') as f:
    yaml_params = yaml.load(f, Loader=yaml.Loader)

gen.add("alpha_CL", double_t,    0, "Centerline Cost", yaml_params['mpc_params']['objective']['alpha_CL'])
gen.add("alpha_L", double_t,    0, "Lag Cost", yaml_params['mpc_params']['objective']['alpha_L'])
gen.add("q_r", double_t,    0, "Yaw Rate Cost", yaml_params['mpc_params']['objective']['q_r'])
