gen.add("d_max", double_t,    0, "Max Throttle", yaml_params['mpc_params']['objective']['d_max'])
gen.add("beta_steer", double_t,    0, "Steering Cost", yaml_params['mpc_params']['objective']['beta_steer'])
gen.add("lambda", double_t,    0, "Progress Cost (inverse)", yaml_params['mpc_params']['objective']['lambda'])
gen.add("v_max", double_t,    0, "Max Velocity", yaml_params['mpc_params']['objective']['v_max'])
gen.add("q_v_max", double_t,    0, "Max Velocity Cost", yaml_params['mpc_params']['objective']['q_v_max'])
gen.add("l_f", double_t,    0, "Front Axle to CG", yaml_params['model_params']['l_f'])
gen.add("l_r", double_t,    0, "Rear Axle to CG", yaml_params['model_params']['l_r'])
gen.add("m", double_t,    0, "Mass", yaml_params['model_params']['m'])
gen.add("I_z", double_t,    0, "Yaw Inertia", yaml_params['model_params']['I_z'])
