##########################
# Controller settings    #
##########################
N: 50 # prediction horizon steps
t_delay: 0.0025 #0.01
steps_delay: 3
MPC_freq: 20 #40

track_safety_margin: 0.5 #0.25
track_max_width: !!float 100 #100 [m]
#overtake_d: !!float 1

##########################
# Cost function settings #
##########################
#qjerk: !!float 1e-2 #acceleration cost
#qddelta: !!float 5e-1 #ddelta cost
#qadv: !!float 0 #1e-5
#qn: 40 #40 # 4 for vy minimization
#qalpha: 0.1 #50 # NOTE: actually make the problem quite unstable! # 100 for vy minimization
#qv: !!float 10 #2e-2 #2e-1 velocity cost (linear, for velocity maximization)
qs: !!float 1 # progress maximization
qbeta: !!float 40 # smooth side slip angle
qdthrottle: !!float 1 # smooth throttle rate
qddelta: !!float 1 # smooth steering rate
qvx: !!float 10 # velocity maximization
qvy: !!float 100 #100 lateral velocity minimization
qn: !!float 0.01 # lateral position minimization
qtheta: !!float 0.01 # heading angle minimization

Zl: !!float 500 #100 quadratic coefficient state slack variable
Zu: !!float 500 #100 quadratic coefficient input slack variable
zl: !!float 500 #100 linear coefficient state slack variable
zu: !!float 500 #100 linear coefficient input slack variable


#####################
# Model constraints #
#####################
#state bounds
delta_min: !!float -0.4  #-0.4 minimum steering angle [rad]
delta_max: !!float 0.4 #0.4 maximum steering angle [rad]
v_min: !!float -0.5 # minimum velocity [m/s]
v_max: !!float 5.0 # maximum velocity [m/s]
throttle_min: !!float -0.2 #-6  #-12 minimum velocity change rate
throttle_max: !!float 0.2 # maximum velocity change rate



# input bounds
ddelta_min: !!float -3.2 #-5 minimum change rate of stering angle [rad/s]
ddelta_max: !!float 3.2  #5 maximum change rate of steering angle [rad/s]
dthrottle_min: !!float -2
dthrottle_max: !!float 2

# nonlinear constraint
# numbers are too high because the approximation severely underestimates the actual values
alat_max: !!float 10  #12 maximum lateral force [m/s^1] 5

#####################
# Cost Flags #
#####################
s_maximization: 2 # If true, the cost function will maximize the progress along the track
vx_maximization: false # If true, the cost function will maximize the longitudinal velocity
vy_minimization: false # If true, the cost function will minimize the lateral velocity
diff_beta_minimization: true # If true, the cost function will minimize the side slip angle

#####################
# constraints flags #
#####################
combined_constraints: "None" # ellipse/diamond/anything else for None

# model flags #
load_transfer: false
correct_v_y_dot: true
